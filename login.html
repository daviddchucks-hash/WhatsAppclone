<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log In · ChatApp</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/auth.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body class="auth-page">

<div class="auth-card fade-in">
  <div class="auth-brand">
    <div class="logo-circle">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.03 2 11c0 2.42 1.09 4.6 2.86 6.19L4 22l5.11-1.34C10.02 20.88 11 21 12 21c5.52 0 10-4.03 10-9S17.52 2 12 2z" fill="#fff"/></svg>
    </div>
    <h1>ChatApp</h1>
  </div>
  <p class="subtitle">Log in to continue messaging</p>

  <form id="login-form" novalidate>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-input-wrap">
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
        <button type="button" class="password-toggle" data-target="password">Show</button>
      </div>
    </div>
    <a href="#" id="forgot-password-link" class="forgot-link">Forgot password?</a>
    <div class="form-error" id="login-error"></div>
    <button type="submit" class="btn btn-primary btn-block">Log In</button>
  </form>

  <div class="auth-footer-link">
    Don't have an account? <a href="register.html">Sign up</a>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal slide-up">
    <div class="modal-header">
      <h3>Reset Password</h3>
      <button class="btn-icon" id="close-reset-modal">✕</button>
    </div>
    <div class="modal-body">
      <p style="color: var(--clr-text-muted); font-size: 14px; margin-bottom: 16px;">
        Enter your email address and we'll send you a link to reset your password.
      </p>
      <div class="form-group">
        <label for="reset-email">Email</label>
        <input type="email" id="reset-email" placeholder="you@example.com" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-reset">Cancel</button>
      <button class="btn btn-primary" id="send-reset">Send Reset Link</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script type="module">
  import { loginUser, resetPassword, redirectIfAuthenticated, friendlyAuthError, bindAuthForm } from "./js/auth.js";
  import { showToast } from "./js/utilities.js";

  await redirectIfAuthenticated();

  const form = document.getElementById("login-form");
  const errorEl = document.getElementById("login-error");

  bindAuthForm(form, async () => {
    errorEl.classList.remove("visible");
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    try {
      await loginUser(email, password);
      window.location.href = "chat.html";
    } catch (err) {
      errorEl.textContent = friendlyAuthError(err);
      errorEl.classList.add("visible");
      throw err;
    }
  });

  // Show/hide password
  document.querySelectorAll(".password-toggle").forEach((btn) => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";
      btn.textContent = isPassword ? "Hide" : "Show";
    });
  });

  // Forgot password modal
  const resetModal = document.getElementById("reset-modal");
  document.getElementById("forgot-password-link").addEventListener("click", (e) => {
    e.preventDefault();
    document.getElementById("reset-email").value = document.getElementById("email").value;
    resetModal.classList.add("open");
  });
  document.getElementById("close-reset-modal").addEventListener("click", () => resetModal.classList.remove("open"));
  document.getElementById("cancel-reset").addEventListener("click", () => resetModal.classList.remove("open"));
  document.getElementById("send-reset").addEventListener("click", async () => {
    const email = document.getElementById("reset-email").value.trim();
    try {
      await resetPassword(email);
      showToast("Password reset email sent! Check your inbox.");
      resetModal.classList.remove("open");
    } catch (err) {
      showToast(friendlyAuthError(err));
    }
  });
</script>
</body>
</html>
