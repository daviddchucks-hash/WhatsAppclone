<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatApp</title>
<link rel="icon" href="data:,">
<style>
  html, body { height: 100%; margin: 0; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(160deg,#008069,#00a884); font-family: 'Segoe UI', Arial, sans-serif; }
  .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.35); border-top-color:#fff;
    border-radius:50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner"></div>

<!-- Firebase compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script type="module">
  import { auth } from "./js/firebase-config.js";
  auth.onAuthStateChanged((user) => {
    window.location.replace(user ? "chat.html" : "login.html");
  });
</script>
</body>
</html>
