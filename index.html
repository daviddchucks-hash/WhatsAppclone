<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drexy</title>
<link rel="icon" href="data:,">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap');
  html,body{height:100%;margin:0;display:flex;align-items:center;justify-content:center;
    background:#07071A;font-family:'Poppins',system-ui,sans-serif;}
  .splash{display:flex;flex-direction:column;align-items:center;gap:24px;}
  .logo{width:72px;height:72px;border-radius:20px;
    background:linear-gradient(135deg,#7C3AED,#A855F7);
    display:flex;align-items:center;justify-content:center;
    font-size:38px;font-weight:800;color:#fff;
    box-shadow:0 12px 40px rgba(124,58,237,.5);
    animation:pulse 2s ease-in-out infinite;}
  .wordmark{font-size:32px;font-weight:800;letter-spacing:-.04em;
    background:linear-gradient(135deg,#A78BFA,#F472B6);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .spinner{width:36px;height:36px;border:3px solid rgba(139,92,246,.2);
    border-top-color:#8B5CF6;border-radius:50%;animation:spin .75s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{box-shadow:0 12px 40px rgba(124,58,237,.5);}
    50%{box-shadow:0 12px 60px rgba(124,58,237,.8);}}
</style>
</head>
<body>
<div class="splash">
  <div class="logo">D</div>
  <div class="wordmark">Drexy</div>
  <div class="spinner"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script type="module">
  import { auth } from "./js/firebase-config.js";
  auth.onAuthStateChanged((user) => {
    window.location.replace(user ? "chat.html" : "login.html");
  });
</script>
</body>
</html>
