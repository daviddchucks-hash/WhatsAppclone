<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings · ChatApp</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/chat.css" />
<link rel="stylesheet" href="css/responsive.css" />
<style>
  .settings-page { max-width: 520px; margin: 0 auto; min-height: 100vh; background: var(--clr-panel); }
  .settings-header { display:flex; align-items:center; gap:16px; padding:16px 20px; background:var(--clr-panel-alt); border-bottom:1px solid var(--clr-border); }
  .settings-user { display:flex; align-items:center; gap:14px; padding:20px 24px; border-bottom: 8px solid var(--clr-panel-alt); cursor:pointer; }
  .settings-user .name { font-size:17px; font-weight:600; }
  .settings-user .sub { font-size:13px; color:var(--clr-text-muted); }
  .settings-row { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--clr-border); }
  .settings-row .label { font-size:15px; }
  .settings-row .desc { font-size:12.5px; color:var(--clr-text-muted); margin-top:2px; }
  .switch { position:relative; width:44px; height:24px; background:var(--clr-border); border-radius:12px; transition:background .2s; flex-shrink:0; }
  .switch.on { background: var(--clr-primary); }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:50%; transition:transform .2s; }
  .switch.on::after { transform: translateX(20px); }
  .theme-options { display:flex; gap:10px; padding: 4px 24px 16px; }
  .theme-option { flex:1; border:2px solid var(--clr-border); border-radius:10px; padding:10px; text-align:center; font-size:13px; cursor:pointer; }
  .theme-option.active { border-color: var(--clr-primary); color: var(--clr-primary-dark); font-weight:600; }
</style>
</head>
<body>

<div class="settings-page">
  <div class="settings-header">
    <button class="btn-icon" id="back-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h2>Settings</h2>
  </div>

  <div class="settings-user" id="go-profile">
    <img id="settings-avatar" class="avatar avatar-lg" src="" alt="avatar" />
    <div>
      <div class="name" id="settings-name"></div>
      <div class="sub">View and edit profile</div>
    </div>
  </div>

  <div style="padding: 16px 24px 4px; font-size:12.5px; color:var(--clr-primary-dark); font-weight:700; text-transform:uppercase;">Appearance</div>
  <div class="theme-options">
    <div class="theme-option" data-theme="light">☀️ Light</div>
    <div class="theme-option" data-theme="dark">🌙 Dark</div>
    <div class="theme-option" data-theme="system">🖥️ System</div>
  </div>

  <div style="padding: 16px 24px 4px; font-size:12.5px; color:var(--clr-primary-dark); font-weight:700; text-transform:uppercase; border-top: 8px solid var(--clr-panel-alt);">Notifications</div>
  <div class="settings-row">
    <div>
      <div class="label">Desktop Notifications</div>
      <div class="desc">Get notified about new messages</div>
    </div>
    <div class="switch" id="notif-switch"></div>
  </div>
  <div class="settings-row">
    <div>
      <div class="label">Notification Sound</div>
      <div class="desc">Play a sound for new messages</div>
    </div>
    <div class="switch" id="sound-switch"></div>
  </div>

  <div style="border-top: 8px solid var(--clr-panel-alt); padding-top: 4px;">
    <div class="danger-action" id="logout-btn" style="cursor:pointer;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Log Out
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script type="module">
  import { requireAuth, logoutUser } from "./js/auth.js";
  import { getUserProfile } from "./js/profile.js";
  import { enableNotifications, setNotificationsEnabled, getNotificationsEnabled } from "./js/notifications.js";
  import { showToast } from "./js/utilities.js";

  const user = await requireAuth();
  const profile = await getUserProfile(user.uid);

  document.getElementById("settings-avatar").src = profile.photoURL;
  document.getElementById("settings-name").textContent = profile.displayName;

  document.getElementById("back-btn").addEventListener("click", () => (window.location.href = "chat.html"));
  document.getElementById("go-profile").addEventListener("click", () => (window.location.href = "profile.html"));

  // Theme
  const savedTheme = localStorage.getItem("theme") || "system";
  function applyTheme(theme) {
    if (theme === "system") {
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
    } else {
      document.documentElement.setAttribute("data-theme", theme);
    }
    document.querySelectorAll(".theme-option").forEach((el) => {
      el.classList.toggle("active", el.dataset.theme === theme);
    });
    localStorage.setItem("theme", theme);
  }
  applyTheme(savedTheme);
  document.querySelectorAll(".theme-option").forEach((el) => {
    el.addEventListener("click", () => applyTheme(el.dataset.theme));
  });

  // Notifications
  const notifSwitch = document.getElementById("notif-switch");
  const soundSwitch = document.getElementById("sound-switch");
  notifSwitch.classList.toggle("on", getNotificationsEnabled());
  soundSwitch.classList.toggle("on", localStorage.getItem("soundEnabled") !== "false");

  notifSwitch.addEventListener("click", async () => {
    if (!notifSwitch.classList.contains("on")) {
      const granted = await enableNotifications();
      notifSwitch.classList.toggle("on", granted);
      if (!granted) showToast("Please allow notifications in your browser settings.");
    } else {
      setNotificationsEnabled(false);
      notifSwitch.classList.remove("on");
    }
  });

  soundSwitch.addEventListener("click", () => {
    const enabled = !soundSwitch.classList.contains("on");
    soundSwitch.classList.toggle("on", enabled);
    localStorage.setItem("soundEnabled", String(enabled));
  });

  document.getElementById("logout-btn").addEventListener("click", async () => {
    if (confirm("Are you sure you want to log out?")) {
      await logoutUser();
      window.location.href = "login.html";
    }
  });
</script>
</body>
</html>
