<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings · Drexy</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/chat.css" />
<link rel="stylesheet" href="css/responsive.css" />
<style>
  body { background: var(--clr-bg); }

  .settings-page {
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--clr-panel);
    display: flex;
    flex-direction: column;
  }

  .settings-top-bar {
    height: var(--header-height);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    background: var(--clr-panel-alt);
    border-bottom: 1px solid var(--clr-border);
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }
  .settings-top-bar h2 {
    font-size: 17px;
    font-weight: 700;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Profile preview card */
  .settings-profile-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    border-bottom: 1px solid var(--clr-border);
    transition: background var(--transition);
  }
  .settings-profile-card:hover { background: var(--clr-hover); }
  .settings-profile-info { flex: 1; min-width: 0; }
  .settings-profile-name { font-size: 16px; font-weight: 700; }
  .settings-profile-sub  { font-size: 13px; color: var(--clr-text-muted); margin-top: 2px; }

  /* Section heading */
  .settings-section-title {
    padding: 16px 24px 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--clr-primary);
  }

  /* Settings row */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 24px;
    border-bottom: 1px solid var(--clr-border);
    transition: background var(--transition);
    gap: 16px;
  }
  .settings-row:hover { background: var(--clr-hover); }
  .settings-row-left { flex: 1; min-width: 0; }
  .settings-row-label { font-size: 15px; font-weight: 500; }
  .settings-row-sub   { font-size: 12.5px; color: var(--clr-text-muted); margin-top: 2px; }

  /* Theme options */
  .theme-options {
    display: flex;
    gap: 8px;
    padding: 12px 24px 16px;
    border-bottom: 1px solid var(--clr-border);
  }
  .theme-option {
    flex: 1;
    padding: 10px 0;
    border-radius: var(--radius-sm);
    border: 2px solid var(--clr-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    color: var(--clr-text-muted);
    background: var(--clr-hover);
  }
  .theme-option:hover { border-color: var(--clr-primary); color: var(--clr-primary); }
  .theme-option.active {
    border-color: var(--clr-primary);
    background: var(--clr-primary-light);
    color: var(--clr-primary);
  }
  .theme-icon { font-size: 22px; }

  /* Toggle switch */
  .toggle-switch {
    width: 48px;
    height: 26px;
    border-radius: 13px;
    background: var(--clr-border-light);
    position: relative;
    cursor: pointer;
    transition: background var(--transition);
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    top: 3px;
    left: 3px;
    transition: left var(--transition);
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  .toggle-switch.on {
    background: var(--gradient-btn);
    box-shadow: 0 0 12px rgba(124,58,237,.4);
  }
  .toggle-switch.on::after { left: 25px; }

  /* Logout button */
  .logout-row {
    padding: 20px 24px;
    margin-top: auto;
    border-top: 1px solid var(--clr-border);
  }
</style>
</head>
<body>

<div class="settings-page">

  <div class="settings-top-bar">
    <button class="btn-icon" id="back-btn" title="Back to chats">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h2>Settings</h2>
  </div>

  <!-- Profile card -->
  <div class="settings-profile-card" id="go-to-profile">
    <img id="settings-avatar" class="avatar avatar-lg" src="" alt="" />
    <div class="settings-profile-info">
      <div class="settings-profile-name" id="settings-name">Loading…</div>
      <div class="settings-profile-sub" id="settings-username"></div>
    </div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="color:var(--clr-text-muted)">
      <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Appearance -->
  <div class="settings-section-title">Appearance</div>
  <div class="theme-options">
    <button class="theme-option" data-theme="dark">
      <span class="theme-icon">🌙</span>Dark
    </button>
    <button class="theme-option" data-theme="light">
      <span class="theme-icon">☀️</span>Light
    </button>
    <button class="theme-option" data-theme="system">
      <span class="theme-icon">⚙️</span>System
    </button>
  </div>

  <!-- Notifications -->
  <div class="settings-section-title">Notifications</div>
  <div class="settings-row">
    <div class="settings-row-left">
      <div class="settings-row-label">Push Notifications</div>
      <div class="settings-row-sub">Get notified when you receive a message</div>
    </div>
    <div class="toggle-switch" id="notif-switch"></div>
  </div>
  <div class="settings-row">
    <div class="settings-row-left">
      <div class="settings-row-label">Sound Effects</div>
      <div class="settings-row-sub">Play a sound for new messages</div>
    </div>
    <div class="toggle-switch" id="sound-switch"></div>
  </div>

  <!-- Account -->
  <div class="settings-section-title">Account</div>
  <div class="settings-row" id="go-to-profile-2" style="cursor:pointer">
    <div class="settings-row-left">
      <div class="settings-row-label">Edit Profile</div>
      <div class="settings-row-sub">Change name, username, avatar</div>
    </div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:var(--clr-text-muted)">
      <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Logout -->
  <div class="logout-row">
    <button class="btn btn-danger btn-block" id="logout-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Sign Out
    </button>
  </div>

</div><!-- /settings-page -->

<div id="toast"></div>
<div id="loading-overlay"><div class="spinner"></div><span>Signing out…</span></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script type="module">
  import { requireAuth, logoutUser } from "./js/auth.js";
  import { getUserProfile }          from "./js/profile.js";
  import { enableNotifications, setNotificationsEnabled, getNotificationsEnabled } from "./js/notifications.js";
  import { showToast } from "./js/utilities.js";

  const user = await requireAuth();

  // Back button
  document.getElementById("back-btn").addEventListener("click", () => window.location.href = "chat.html");
  [document.getElementById("go-to-profile"), document.getElementById("go-to-profile-2")].forEach(el => {
    el?.addEventListener("click", () => window.location.href = "profile.html");
  });

  // Load profile info
  try {
    const profile = await getUserProfile(user.uid);
    if (profile) {
      document.getElementById("settings-avatar").src   = profile.photoURL || "";
      document.getElementById("settings-name").textContent     = profile.displayName || user.email;
      document.getElementById("settings-username").textContent = profile.username ? "@" + profile.username : "";
    }
  } catch (_) {}

  // Theme
  const savedTheme = localStorage.getItem("drexy-theme") || "dark";
  function applyTheme(theme) {
    if (theme === "system") {
      const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    } else {
      document.documentElement.setAttribute("data-theme", theme);
    }
    document.querySelectorAll(".theme-option").forEach(el => {
      el.classList.toggle("active", el.dataset.theme === theme);
    });
    localStorage.setItem("drexy-theme", theme);
  }
  applyTheme(savedTheme);
  document.querySelectorAll(".theme-option").forEach(el => {
    el.addEventListener("click", () => applyTheme(el.dataset.theme));
  });

  // Notification toggles
  const notifSwitch = document.getElementById("notif-switch");
  const soundSwitch = document.getElementById("sound-switch");
  notifSwitch.classList.toggle("on", getNotificationsEnabled());
  soundSwitch.classList.toggle("on", localStorage.getItem("soundEnabled") !== "false");

  notifSwitch.addEventListener("click", async () => {
    if (!notifSwitch.classList.contains("on")) {
      const granted = await enableNotifications();
      notifSwitch.classList.toggle("on", granted);
      if (!granted) showToast("Allow notifications in your browser settings first.");
    } else {
      setNotificationsEnabled(false);
      notifSwitch.classList.remove("on");
    }
  });
  soundSwitch.addEventListener("click", () => {
    const on = !soundSwitch.classList.contains("on");
    soundSwitch.classList.toggle("on", on);
    localStorage.setItem("soundEnabled", String(on));
  });

  // Logout
  document.getElementById("logout-btn").addEventListener("click", async () => {
    if (!confirm("Sign out of Drexy?")) return;
    try {
      await logoutUser();
      window.location.href = "login.html";
    } catch (err) {
      showToast(err.message);
    }
  });
</script>
</body>
</html>
