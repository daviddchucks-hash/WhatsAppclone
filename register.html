<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign Up · ChatApp</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/auth.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body class="auth-page">

<div class="auth-card fade-in">
  <div class="auth-brand">
    <div class="logo-circle">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.03 2 11c0 2.42 1.09 4.6 2.86 6.19L4 22l5.11-1.34C10.02 20.88 11 21 12 21c5.52 0 10-4.03 10-9S17.52 2 12 2z" fill="#fff"/></svg>
    </div>
    <h1>ChatApp</h1>
  </div>
  <p class="subtitle">Create an account to get started</p>

  <form id="register-form" novalidate>
    <div class="form-group">
      <label for="displayName">Display Name</label>
      <input type="text" id="displayName" placeholder="e.g. Jane Doe" required autocomplete="name" />
    </div>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="e.g. janedoe" required autocomplete="username" />
      <p class="field-hint">3-20 characters. Letters, numbers, underscore only.</p>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-input-wrap">
        <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password" />
        <button type="button" class="password-toggle" data-target="password">Show</button>
      </div>
    </div>
    <div class="form-error" id="register-error"></div>
    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
  </form>

  <div class="auth-footer-link">
    Already have an account? <a href="login.html">Log in</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script type="module">
  import { registerUser, redirectIfAuthenticated, friendlyAuthError, bindAuthForm } from "./js/auth.js";

  await redirectIfAuthenticated();

  const form = document.getElementById("register-form");
  const errorEl = document.getElementById("register-error");

  bindAuthForm(form, async () => {
    errorEl.classList.remove("visible");
    const displayName = document.getElementById("displayName").value.trim();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    try {
      await registerUser({ email, password, displayName, username });
      window.location.href = "chat.html";
    } catch (err) {
      errorEl.textContent = friendlyAuthError(err);
      errorEl.classList.add("visible");
      throw err;
    }
  });

  document.querySelectorAll(".password-toggle").forEach((btn) => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";
      btn.textContent = isPassword ? "Hide" : "Show";
    });
  });
</script>
</body>
</html>
