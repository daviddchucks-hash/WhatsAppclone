<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile · Drexy</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/chat.css" />
<link rel="stylesheet" href="css/responsive.css" />
<style>
  body { background: var(--clr-bg); }

  .profile-page {
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--clr-panel);
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .profile-top-bar {
    height: var(--header-height);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    background: var(--clr-panel-alt);
    border-bottom: 1px solid var(--clr-border);
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }
  .profile-top-bar h2 {
    font-size: 17px;
    font-weight: 700;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Avatar hero */
  .profile-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 28px;
    background: linear-gradient(180deg, var(--clr-panel-alt) 0%, var(--clr-panel) 100%);
    border-bottom: 1px solid var(--clr-border);
  }
  .avatar-upload-wrap {
    position: relative;
    cursor: pointer;
  }
  .avatar-upload-wrap .overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(124,58,237,.6);
    backdrop-filter: blur(4px);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .2s;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    letter-spacing: .02em;
    flex-direction: column;
    gap: 4px;
  }
  .avatar-upload-wrap:hover .overlay { opacity: 1; }
  .upload-icon { font-size: 22px; }

  /* Fields */
  .profile-fields { flex: 1; }
  .profile-field {
    padding: 18px 24px;
    border-bottom: 1px solid var(--clr-border);
    transition: background var(--transition);
  }
  .profile-field:hover { background: var(--clr-hover); }
  .profile-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--clr-primary);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }
  .field-value-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .profile-field input,
  .profile-field textarea {
    border: none;
    background: transparent;
    font-size: 15px;
    width: 100%;
    padding: 0;
    color: var(--clr-text);
    font-family: inherit;
    resize: none;
  }
  .profile-field input:disabled,
  .profile-field textarea:disabled {
    opacity: .85;
    cursor: default;
  }
  .profile-field input:focus,
  .profile-field textarea:focus {
    outline: none;
  }
  .edit-toggle {
    color: var(--clr-text-muted);
    flex-shrink: 0;
    font-size: 16px;
    line-height: 1;
    padding: 6px;
    border-radius: var(--radius-xs);
    transition: all var(--transition);
  }
  .edit-toggle:hover {
    background: var(--clr-primary-light);
    color: var(--clr-primary);
  }
  .profile-field .hint {
    font-size: 12px;
    color: var(--clr-text-dim);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* Saving indicator */
  .save-status {
    font-size: 12px;
    font-weight: 600;
    color: var(--clr-online);
    margin-top: 6px;
    min-height: 18px;
  }
</style>
</head>
<body>

<div class="profile-page">

  <!-- Top bar -->
  <div class="profile-top-bar">
    <button class="btn-icon" id="back-btn" title="Back to chats">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h2>My Profile</h2>
  </div>

  <!-- Avatar upload hero -->
  <div class="profile-hero">
    <label class="avatar-upload-wrap">
      <img id="profile-avatar" class="avatar avatar-xxl" src="" alt="Your avatar" />
      <div class="overlay">
        <span class="upload-icon">📷</span>
        Change Photo
      </div>
      <input type="file" id="avatar-input" accept="image/*" hidden />
    </label>
  </div>

  <!-- Editable fields -->
  <div class="profile-fields">

    <div class="profile-field">
      <label>Display Name</label>
      <div class="field-value-row">
        <input type="text" id="displayName-input" disabled />
        <button class="edit-toggle btn-icon" data-field="displayName" title="Edit">✎</button>
      </div>
      <p class="hint">This is the name your contacts see.</p>
    </div>

    <div class="profile-field">
      <label>Username</label>
      <div class="field-value-row">
        <input type="text" id="username-input" disabled />
        <button class="edit-toggle btn-icon" data-field="username" title="Edit">✎</button>
      </div>
      <p class="hint">People can find you by this unique handle.</p>
    </div>

    <div class="profile-field">
      <label>About</label>
      <div class="field-value-row">
        <textarea id="about-input" disabled rows="2"></textarea>
        <button class="edit-toggle btn-icon" data-field="about" title="Edit">✎</button>
      </div>
    </div>

    <div class="profile-field">
      <label>Email</label>
      <div class="field-value-row">
        <input type="text" id="email-display" disabled />
      </div>
      <p class="hint">Email cannot be changed here.</p>
    </div>

    <div class="save-status" id="save-status" style="padding:0 24px 16px"></div>
  </div>
</div>

<div id="toast"></div>
<div id="loading-overlay"><div class="spinner"></div><span>Saving…</span></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script type="module">
  import { requireAuth } from "./js/auth.js";
  import { getUserProfile, updateProfileText, updateUsername, changeProfilePicture } from "./js/profile.js";
  import { showToast, setLoading } from "./js/utilities.js";

  const user = await requireAuth();
  document.getElementById("back-btn").addEventListener("click", () => {
    window.location.href = "chat.html";
  });

  // Load profile
  const profile = await getUserProfile(user.uid);
  if (profile) {
    document.getElementById("displayName-input").value = profile.displayName || "";
    document.getElementById("username-input").value    = profile.username || "";
    document.getElementById("about-input").value       = profile.about || "";
    document.getElementById("email-display").value     = user.email || "";
    document.getElementById("profile-avatar").src      = profile.photoURL || "";
  }

  // Edit toggle
  let editingField = null;
  document.querySelectorAll(".edit-toggle").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const field = btn.dataset.field;
      const inputId = field === "displayName" ? "displayName-input"
                    : field === "username"    ? "username-input"
                    :                           "about-input";
      const inputEl = document.getElementById(inputId);
      const statusEl = document.getElementById("save-status");

      if (editingField === field) {
        // Save
        try {
          setLoading(true, "Saving…");
          if (field === "username") {
            await updateUsername(user.uid, profile.username, inputEl.value.trim());
            profile.username = inputEl.value.trim();
          } else {
            const update = {};
            update[field] = inputEl.value.trim();
            await updateProfileText(user.uid, update);
          }
          inputEl.disabled = true;
          btn.textContent  = "✎";
          editingField = null;
          statusEl.textContent = "✅ Saved!";
          setTimeout(() => (statusEl.textContent = ""), 2500);
        } catch (err) {
          showToast(err.message);
        } finally {
          setLoading(false);
        }
      } else {
        // Enable editing
        if (editingField) {
          const prevId = editingField === "displayName" ? "displayName-input"
                       : editingField === "username"    ? "username-input"
                       :                                  "about-input";
          document.getElementById(prevId).disabled = true;
          document.querySelector(`[data-field="${editingField}"]`).textContent = "✎";
        }
        inputEl.disabled = false;
        inputEl.focus();
        btn.textContent = "✔";
        editingField = field;
      }
    });
  });

  // Avatar upload
  document.getElementById("avatar-input").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      setLoading(true, "Uploading photo…");
      const url = await changeProfilePicture(user.uid, file);
      document.getElementById("profile-avatar").src = url;
      showToast("✅ Profile photo updated!");
    } catch (err) {
      showToast(err.message);
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
