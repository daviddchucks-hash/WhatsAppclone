<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drexy</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/chat.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<!-- ═══════════════════════════════ APP SHELL ═══════════════════════════════ -->
<div class="app-shell" id="app-shell">

  <!-- ═════════════════════════════ SIDEBAR ════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="brand-mark">
        <div class="brand-icon">D</div>
        <span class="brand-name">Drexy</span>
      </div>
      <div class="actions">
        <img id="my-avatar" class="avatar avatar-sm" src="" alt="My profile"
             style="cursor:pointer;border-radius:50%;border:2px solid var(--clr-border)" />
        <button class="btn-icon" id="new-group-btn" title="New group">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="btn-icon" id="settings-btn" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09A1.65 1.65 0 0015 4.6a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="search-bar">
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search or start new chat" />
      </div>
    </div>

    <div id="search-results" class="search-results-list" style="display:none"></div>
    <div id="chat-list" class="chat-list"></div>
  </aside>

  <!-- ═════════════════════════ CHAT WINDOW ═══════════════════════════════ -->
  <main class="chat-window" id="chat-window" style="position:relative;overflow:hidden">

    <!-- Main content area (chat + empty state) -->
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">

      <!-- Empty state -->
      <div class="empty-state" id="no-chat-selected">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <h3>Drexy</h3>
        <p>Select a conversation or search for someone to start chatting.</p>
      </div>

      <!-- Active chat -->
      <div id="active-chat" style="display:none;flex-direction:column;height:100%">

        <!-- Chat header -->
        <div class="chat-header" id="chat-header-clickable">
          <button class="btn-icon back-btn" id="back-to-list" title="Back">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="avatar-wrap">
            <img id="header-avatar" class="avatar avatar-md" src="" alt="" />
            <span class="online-dot" id="header-online-dot"></span>
          </div>
          <div class="header-info">
            <div class="header-name" id="header-name"></div>
            <div class="header-status" id="header-status"></div>
          </div>
          <div class="header-actions">
            <button class="btn-icon" id="header-search-btn" title="Search in chat">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Messages + controls -->
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">

          <!-- Messages list -->
          <div id="messages-container" class="messages-container"></div>

          <!-- Typing indicator -->
          <div id="typing-indicator-el" class="typing-indicator" style="display:none">
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
            <span class="typing-text">typing…</span>
          </div>

          <!-- Reply bar -->
          <div id="reply-bar" style="display:none;align-items:center;gap:12px;padding:10px 16px;
               background:var(--clr-panel-alt);border-top:1px solid var(--clr-border)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:var(--clr-primary);flex-shrink:0">
              <path d="M9 10l-5 5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 15h8a8 8 0 018-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="reply-bar-content" style="flex:1;min-width:0;border-left:3px solid var(--clr-primary);padding-left:10px">
              <div id="reply-bar-sender" style="font-size:12.5px;font-weight:700;color:var(--clr-primary);margin-bottom:2px"></div>
              <div id="reply-bar-text" style="font-size:13px;color:var(--clr-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
            </div>
            <button class="btn-icon" id="cancel-reply" title="Cancel reply" style="flex-shrink:0">✕</button>
          </div>

          <!-- Recording indicator -->
          <div id="recording-indicator" style="display:none;align-items:center;gap:14px;padding:10px 16px;
               background:rgba(244,63,94,.08);border-top:1px solid rgba(244,63,94,.2)">
            <div class="recording-dot"></div>
            <span id="recording-time" style="font-size:14px;font-weight:600;color:var(--clr-danger);flex:1">0:00</span>
            <button class="btn-icon" id="cancel-recording" title="Cancel">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="btn btn-primary" id="send-recording" style="height:36px;padding:0 16px;font-size:13px">
              Send
            </button>
          </div>

          <!-- Composer form -->
          <form id="composer-form" class="input-bar" autocomplete="off">
            <!-- Emoji -->
            <div class="emoji-picker-wrap">
              <button type="button" class="btn-icon" id="emoji-btn" title="Emoji">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                  <path d="M8 14s1.5 2 4 2 4-2 4-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <circle cx="9" cy="10" r="1" fill="currentColor"/>
                  <circle cx="15" cy="10" r="1" fill="currentColor"/>
                </svg>
              </button>
              <div id="emoji-picker" class="emoji-picker"></div>
            </div>

            <!-- Attach -->
            <div class="attach-wrap">
              <button type="button" class="btn-icon" id="attach-btn" title="Attach">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div id="attach-options" class="attach-options" style="display:none"></div>
              <input type="file" id="file-input" hidden />
            </div>

            <!-- Text area -->
            <div class="input-wrap">
              <textarea id="message-input" placeholder="Type a message…" rows="1"></textarea>
            </div>

            <!-- Mic -->
            <button type="button" class="btn-icon" id="mic-btn" title="Voice note">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>

            <!-- Send -->
            <button type="submit" class="send-btn" id="send-btn" title="Send">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </form>

        </div><!-- /messages + controls -->
      </div><!-- /active-chat -->
    </div><!-- /chat content area -->

    <!-- Info panel (slides in from right, absolute) -->
    <div id="info-panel" class="info-panel"
         style="position:absolute;top:0;right:0;bottom:0;width:340px;
                transform:translateX(100%);transition:transform .3s ease;
                z-index:20;background:var(--clr-panel);border-left:1px solid var(--clr-border);
                display:flex;flex-direction:column;overflow:hidden">
      <div class="info-header">
        <button class="btn-icon" id="close-info-panel" title="Close">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h3 id="info-panel-title">Contact info</h3>
      </div>
      <div id="info-panel-body" class="info-body" style="flex:1;overflow-y:auto"></div>
    </div>

  </main><!-- /chat-window -->
</div><!-- /app-shell -->

<!-- ═════════════════════ NEW GROUP MODAL ═══════════════════════════════ -->
<div class="modal-overlay" id="new-group-modal">
  <div class="modal slide-up">
    <div class="modal-header">
      <h3>New Group</h3>
      <button class="btn-icon" id="close-new-group">✕</button>
    </div>
    <div class="modal-body">
      <label style="display:flex;flex-direction:column;align-items:center;cursor:pointer;margin-bottom:20px">
        <img id="group-icon-img" class="avatar avatar-xl"
             src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%231E1E48'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' dominant-baseline='middle' font-size='18' fill='%238B5CF6'%3E👥%3C/text%3E%3C/svg%3E"
             alt="Group icon" />
        <span style="font-size:12px;color:var(--clr-text-muted);margin-top:8px">Tap to upload icon</span>
        <input type="file" id="group-icon-input" accept="image/*" hidden />
      </label>
      <div class="form-group">
        <label for="group-name-input">Group Name</label>
        <input type="text" id="group-name-input" placeholder="e.g. The Dream Team" maxlength="60" />
      </div>
      <div class="form-group">
        <label for="group-member-search">Add Members</label>
        <input type="text" id="group-member-search" placeholder="Search by name or username…" />
      </div>
      <div id="group-selected-members" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px"></div>
      <div id="group-member-results" style="max-height:200px;overflow-y:auto;border-radius:var(--radius-sm)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-new-group">Cancel</button>
      <button class="btn btn-primary" id="create-group-btn">Create Group</button>
    </div>
  </div>
</div>

<!-- ═════════════════════ ADD MEMBERS MODAL ══════════════════════════════ -->
<div class="modal-overlay" id="add-members-modal">
  <div class="modal slide-up">
    <div class="modal-header">
      <h3>Add Members</h3>
      <button class="btn-icon" id="close-add-members">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <input type="text" id="add-member-search" placeholder="Search by name or username…" />
      </div>
      <div id="add-member-selected" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px"></div>
      <div id="add-member-results" style="max-height:220px;overflow-y:auto;border-radius:var(--radius-sm)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-add-members">Cancel</button>
      <button class="btn btn-primary" id="confirm-add-members">Add Members</button>
    </div>
  </div>
</div>

<!-- ════════════════════════ LIGHTBOX ════════════════════════════════════ -->
<div class="lightbox" id="lightbox">
  <button class="close-lightbox" id="close-lightbox">✕</button>
  <div id="lightbox-content"></div>
</div>

<!-- ════════════════════════ TOAST & OVERLAY ═════════════════════════════ -->
<div id="toast"></div>
<div id="loading-overlay"><div class="spinner"></div><span id="loading-text">Please wait…</span></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script type="module" src="js/app.js"></script>
</body>
</html>
